<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>走走 👣 你的育兒好去處</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C98F8F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="走走">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="scroll-area">
    <div class="hhb">
      <button class="add-btn-home" onclick="openAddModal()">➕</button>
      <span class="hb">🎒</span>
      <div class="ht">走走，今天去哪裡？</div>
      <div class="hs">抽一個育兒好去處 ✨</div>
      <button class="dmb" onclick="startDraw()">🎲 Let's GO ٩(*•̀ᴗ•́*)و</button>
    </div>

    <div class="sa">
      <div class="sd" id="slot-drum">
        <div class="sft"></div><div class="shl"></div><div class="sfb"></div>
        <div class="si" id="slot-inner"></div>
      </div>
      <div class="rcw" id="rcw">
        <div class="rcard" onclick="openDetailFromResult()">
          <div class="rcb" id="rcb"></div>
          <div class="rcc">
            <div class="rcbg" id="rcbg"></div>
            <div class="rcn" id="rcn"></div>
            <div class="rcy" id="rcy"></div>
            <div class="rctg" id="rctg"></div>
            <div class="rca">
              <button class="rcbtn rcbtn-map" id="rcmap">🗺️ 導航</button>
              <button class="rcbtn rcbtn-more">📖 查看詳情</button>
            </div>
          </div>
        </div>
      </div>
      <div class="daw" id="daw">
        <button class="dab" onclick="startDraw()">🔀 再抽一次</button>
      </div>
    </div>

    <div id="home-pre-content">
      <div class="home-tip">
        <div class="tip-icon">💡</div>
        <div class="tip-text">不知道去哪？<b>點擊 Let's GO</b> 抽一張！</div>
      </div>
      <div class="home-sec">
        <div class="home-sec-title">⭐ 今日精選</div>
        <div class="home-sec-more" onclick="goPage('attractions')">更多 →</div>
      </div>
      <div class="home-hscroll" id="home-featured"></div>
      <div class="home-sec">
        <div class="home-sec-title">❤️ 我的收藏</div>
        <div class="home-sec-more" onclick="goPage('favorites')">全部 →</div>
      </div>
      <div class="fav-preview-wrap" id="home-fav-preview"></div>
    </div>
  </div>
</div>

<!-- ATTRACTIONS -->
<div class="page" id="page-attractions">
  <div class="ph"><div style="font-size:24px">🏞️</div><h1>景點</h1><button class="ib" onclick="requestGPS()">📍</button></div>
  <div class="sw"><div class="sb"><span style="font-size:16px">🔎</span><input type="text" placeholder="搜尋..." id="search-attractions" oninput="filterList('attractions')"></div></div>
  <div class="fr" id="fr-attractions"></div>
  <div class="scroll-area" id="list-attractions"></div>
</div>

<!-- RESTAURANTS -->
<div class="page" id="page-restaurants">
  <div class="ph"><div style="font-size:24px">🍽️</div><h1>餐廳</h1><button class="ib" onclick="requestGPS()">📍</button></div>
  <div class="sw"><div class="sb"><span style="font-size:16px">🔎</span><input type="text" placeholder="搜尋..." id="search-restaurants" oninput="filterList('restaurants')"></div></div>
  <div class="fr" id="fr-restaurants"></div>
  <div class="scroll-area" id="list-restaurants"></div>
</div>

<!-- SHOPPING -->
<div class="page" id="page-shopping">
  <div class="ph"><div style="font-size:24px">🛍️</div><h1>購物</h1><button class="ib" onclick="requestGPS()">📍</button></div>
  <div class="sw"><div class="sb"><span style="font-size:16px">🔎</span><input type="text" placeholder="搜尋..." id="search-shopping" oninput="filterList('shopping')"></div></div>
  <div class="fr" id="fr-shopping"></div>
  <div class="scroll-area" id="list-shopping"></div>
</div>

<!-- ACCOMMODATION -->
<div class="page" id="page-accommodation">
  <div class="ph"><div style="font-size:24px">🏨</div><h1>住宿</h1><button class="ib" onclick="requestGPS()">📍</button></div>
  <div class="sw"><div class="sb"><span style="font-size:16px">🔎</span><input type="text" placeholder="搜尋..." id="search-accommodation" oninput="filterList('accommodation')"></div></div>
  <div class="fr" id="fr-accommodation"></div>
  <div class="scroll-area" id="list-accommodation"></div>
</div>

<!-- FAVORITES -->
<div class="page" id="page-favorites">
  <div class="ph"><div style="font-size:24px">❤️</div><h1>我的收藏</h1></div>
  <div class="scroll-area" id="list-favorites"></div>
</div>

<!-- BOTTOM NAV -->
<nav id="nav">
  <div class="nav-item active" data-page="home" onclick="goPage('home')"><div class="ni">🏠</div><div class="nl">首頁</div></div>
  <div class="nav-item" data-page="attractions" onclick="goPage('attractions')"><div class="ni">🏞️</div><div class="nl">景點</div></div>
  <div class="nav-item" data-page="restaurants" onclick="goPage('restaurants')"><div class="ni">🍽️</div><div class="nl">餐廳</div></div>
  <div class="nav-item" data-page="shopping" onclick="goPage('shopping')"><div class="ni">🛍️</div><div class="nl">購物</div></div>
  <div class="nav-item" data-page="accommodation" onclick="goPage('accommodation')"><div class="ni">🏨</div><div class="nl">住宿</div></div>
  <div class="nav-item" data-page="favorites" onclick="goPage('favorites')"><div class="ni">❤️</div><div class="nl">收藏</div></div>
</nav>

<!-- FILTER MODAL -->
<div class="mo" id="fmo" onclick="if(event.target.id==='fmo')applyFilters()">
  <div class="ms">
    <div class="mh"></div>
    <div class="mhd">
      <div class="mt" id="fmo-title">篩選</div>
      <div class="cb" id="fcb">找到 0 個</div>
    </div>
    <div class="mb" id="fmo-body"></div>
    <div class="mf">
      <button class="btn btn-outline" onclick="clearFilters()">清除全部</button>
      <button class="btn btn-coral" onclick="applyFilters()">確認篩選 ✓</button>
    </div>
  </div>
</div>

<!-- ADD PLACE MODAL -->
<div class="add-modal" id="add-modal">
  <div class="add-modal-content">
    <div class="add-modal-title">🆕 新增地點</div>
    
    <!-- Step 1 -->
    <div class="add-step active" id="add-step-type">
      <label style="display:block;font-size:13px;font-weight:600;margin-bottom:12px;">選擇地點類型</label>
      <div class="add-type-grid">
        <div class="add-type-btn selected" onclick="selectAddType('attractions')">
          <div class="add-type-btn-icon">🏞️</div>
          <div class="add-type-btn-label">景點</div>
        </div>
        <div class="add-type-btn" onclick="selectAddType('restaurants')">
          <div class="add-type-btn-icon">🍽️</div>
          <div class="add-type-btn-label">餐廳</div>
        </div>
        <div class="add-type-btn" onclick="selectAddType('shopping')">
          <div class="add-type-btn-icon">🛍️</div>
          <div class="add-type-btn-label">購物</div>
        </div>
        <div class="add-type-btn" onclick="selectAddType('accommodation')">
          <div class="add-type-btn-icon">🏨</div>
          <div class="add-type-btn-label">住宿</div>
        </div>
      </div>
      <div class="add-actions">
        <button class="add-btn-secondary" onclick="closeAddModal()">取消</button>
        <button class="add-btn-primary" onclick="goAddStep(1)">下一步</button>
      </div>
    </div>

    <!-- Step 2 -->
    <div class="add-step" id="add-step-input">
      <label style="display:block;font-size:13px;font-weight:600;margin-bottom:12px;">選擇輸入方式</label>
      
      <div class="add-input-method active" id="method-url">
        <label><input type="radio" name="input-method" value="url" checked onchange="switchInputMethod('url')">🔗 Google Maps URL</label>
        <input type="text" id="add-url-input" placeholder="貼上 Google Maps 連結...">
      </div>

      <div class="add-input-method" id="method-name">
        <label><input type="radio" name="input-method" value="name" onchange="switchInputMethod('name')">📝 店名 + 地區</label>
        <input type="text" id="add-name-input" placeholder="店名...">
        <select id="add-region-input">
          <option value="">選擇地區...</option>
          <option value="台北市">台北市</option><option value="新北市">新北市</option>
          <option value="基隆市">基隆市</option><option value="桃園市">桃園市</option>
          <option value="新竹市">新竹市</option><option value="新竹縣">新竹縣</option>
          <option value="苗栗縣">苗栗縣</option><option value="台中市">台中市</option>
          <option value="彰化縣">彰化縣</option><option value="南投縣">南投縣</option>
          <option value="雲林縣">雲林縣</option><option value="嘉義市">嘉義市</option>
          <option value="嘉義縣">嘉義縣</option><option value="台南市">台南市</option>
          <option value="高雄市">高雄市</option><option value="屏東縣">屏東縣</option>
          <option value="宜蘭縣">宜蘭縣</option><option value="花蓮縣">花蓮縣</option>
          <option value="台東縣">台東縣</option>
        </select>
      </div>

      <div class="add-actions">
        <button class="add-btn-secondary" onclick="goAddStep(0)">上一步</button>
        <button class="add-btn-secondary" onclick="clearAddInput()">清除</button>
        <button class="add-btn-primary" onclick="startAddSearch()">🤖 AI 搜尋</button>
      </div>
    </div>

    <!-- Step 3 -->
    <div class="add-step" id="add-step-result">
      <div class="add-search-status" id="add-search-loading" style="display:none;">
        <div class="add-loading">
          <div class="add-loading-spinner"></div>
          <div>🤖 AI 正在搜尋...</div>
        </div>
      </div>
      
      <div class="add-search-result" id="add-search-error" style="display:none;">
        <div style="padding:12px;background:#FFE8E8;border-radius:var(--r-lg);color:#8B5C5C;">
          <div style="font-weight:600;margin-bottom:4px;">❌ 搜尋失敗</div>
          <div style="font-size:13px;" id="add-error-msg"></div>
        </div>
        <div class="add-actions" style="margin-top:16px;">
          <button class="add-btn-secondary" onclick="goAddStep(1)">返回修改</button>
        </div>
      </div>

      <div class="add-search-result" id="add-search-success" style="display:none;">
        <div style="color:#4CAF50;font-weight:600;margin-bottom:16px;">✅ 搜尋完成</div>
        <div id="add-results-form"></div>
        <div class="add-actions">
          <button class="add-btn-secondary" onclick="goAddStep(1)">返回修改</button>
          <button class="add-btn-primary" onclick="saveAddPlace()">✅ 保存</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

</div>

<!-- DETAIL PAGE -->
<div id="dp" style="display:none;flex-direction:column;height:100%;width:100%;background:#FEFDF5;overflow:hidden;">
  <div class="dhr" id="dhr">
    <button class="dbk" onclick="closeDetail()">←</button>
    <button class="dfv" id="dfv" onclick="toggleFavDetail()">🤍</button>
    <span class="dhe" id="dhe"></span>
  </div>
  <div class="dbd" id="dbd"></div>
  <div class="dbot">
    <button class="btn btn-mint" onclick="openMap()">🗺️ 導航</button>
    <button class="btn btn-outline" onclick="openWebsite()">🔗 官網</button>
    <button class="btn btn-outline" onclick="copyAddr()">📋 複製</button>
  </div>
</div>

<!-- SCRIPTS -->
<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script src="js/render.js"></script>
<script src="js/add-place.js"></script>
<script src="js/app.js"></script>

</body>
</html>
