<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>走走 ZOUZOU</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #E4B6B6;
            --bg: #FFFBF0;
            --text: #5A4A47;
            --secondary: #8B8178;
        }

        /* 模擬全字庫正圓體 Chiron GoRound TC 的圓潤感 */
        body {
            font-family: 'Noto Sans TC', "PingFang TC", "Hiragino Sans GB", "Microsoft JhengHei", sans-serif;
            background-color: #f8f8f8;
            color: var(--text);
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .font-goround {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            font-weight: 600;
            letter-spacing: 0.08em;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background-color: var(--bg);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .safe-pb { padding-bottom: calc(env(safe-area-inset-bottom) + 100px); }
        
        .glass-header {
            position: sticky;
            top: 0;
            background: rgba(255, 251, 240, 0.9);
            backdrop-filter: blur(12px);
            z-index: 40;
            border-bottom: 1px solid rgba(232, 227, 223, 0.5);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:active { transform: scale(0.95); opacity: 0.9; }

        .card {
            background: white;
            border: 1px solid #E8E3DF;
            border-radius: 2.2rem;
            transition: all 0.2s;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(90, 74, 71, 0.4);
            backdrop-filter: blur(6px);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg);
            width: 100%;
            max-width: 480px;
            border-radius: 3.5rem 3.5rem 0 0;
            padding: 2.5rem;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .nav-item { transition: all 0.3s; }
        .nav-item.active { color: var(--primary); opacity: 1; transform: translateY(-2px); }
        .nav-item.active i { transform: scale(1.1); }

        /* 隱藏捲軸 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        #toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="app" class="app-container">
    <!-- Loading Screen (自動消失防止卡住) -->
    <div id="loading-screen" class="fixed inset-0 bg-[#FFFBF0] z-[200] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-12 h-12 border-4 border-[#E4B6B6]/20 border-t-[#E4B6B6] rounded-full animate-spin mb-4"></div>
        <p class="text-[#E4B6B6] font-goround text-sm">正在載入專屬推薦...</p>
    </div>

    <!-- Header -->
    <header class="glass-header px-6 pt-12 pb-5 flex justify-between items-center">
        <div class="flex items-center gap-2.5">
            <div class="w-10 h-10 bg-[#E4B6B6] rounded-2xl flex items-center justify-center text-white shadow-sm rotate-6">
                <i data-lucide="compass" size="22"></i>
            </div>
            <div class="flex flex-col">
                <span class="text-lg font-goround leading-none tracking-wider">走走 ZOUZOU</span>
                <span class="text-[9px] opacity-30 font-bold uppercase tracking-tighter mt-1">Discovery & Fun</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button id="btn-admin-key" class="hidden p-3 rounded-full bg-white border border-[#E8E3DF] text-[#8B8178] active:scale-90">
                <i data-lucide="key" size="18"></i>
            </button>
            <button id="btn-admin-settings" class="p-3 rounded-full bg-white border border-[#E8E3DF] text-[#8B8178] active:scale-90">
                <i data-lucide="settings" size="18"></i>
            </button>
        </div>
    </header>

    <!-- Main View Area -->
    <main id="main-view" class="px-6 flex-1 safe-pb"></main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full max-w-[480px] bg-white/95 backdrop-blur-xl border-t border-[#E8E3DF] flex justify-around items-center pt-4 pb-10 z-50">
        <button onclick="switchTab('home')" class="nav-item flex flex-col items-center gap-1.5 opacity-30 text-[#8B8178]" data-tab="home">
            <i data-lucide="sparkles" size="22"></i><span class="text-[10px] font-bold font-goround">抽選</span>
        </button>
        <button onclick="switchTab('browse')" class="nav-item flex flex-col items-center gap-1.5 opacity-30 text-[#8B8178]" data-tab="browse">
            <i data-lucide="layout-grid" size="22"></i><span class="text-[10px] font-bold font-goround">瀏覽</span>
        </button>
        <button onclick="openEditModal()" class="nav-item flex flex-col items-center gap-1.5 opacity-40 text-[#8B8178]">
            <div class="w-11 h-11 bg-[#FFFBF0] rounded-2xl border border-[#E8E3DF] flex items-center justify-center -mt-2">
                <i data-lucide="plus" size="20"></i>
            </div>
        </button>
        <button onclick="switchTab('about')" class="nav-item flex flex-col items-center gap-1.5 opacity-30 text-[#8B8178]" data-tab="about">
            <i data-lucide="info" size="22"></i><span class="text-[10px] font-bold font-goround">關於</span>
        </button>
    </nav>

    <!-- UI Elements -->
    <div id="modal-container"></div>
    <div id="toast" class="px-6 py-3 bg-[#5A4A47] text-white rounded-full text-xs shadow-2xl transition-all duration-300 opacity-0 scale-90 hidden"></div>
</div>

<script type="module">
    // Firebase 初始化
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBMif9mWX5DZw7gL0kPDhKirQXevGFUZvg",
        authDomain: "goodidea-f17df.firebaseapp.com",
        databaseURL: "https://goodidea-f17df-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "goodidea-f17df",
        storageBucket: "goodidea-f17df.firebasestorage.app",
        messagingSenderId: "698636228471",
        appId: "1:698636228471:web:13b19d7659f60ed17eb372"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = "zouzou-app-001";

    // Global State
    let places = [];
    let isAdmin = false;
    let currentTab = 'home';
    const PRESET_PLACES = [
        { id: 'p1', name: '陽明山草山行館', cat: 'restaurants', emoji: '🍵', region: '台北市', address: '台北市北投區湖底路89號', description: '幽靜古樸的行館，適合午後品茶。' },
        { id: 'p2', name: '大溪老街', cat: 'attractions', emoji: '🏮', region: '桃園市', address: '桃園市大溪區和平路', description: '巴洛克式建築，一定要吃大溪豆干。' },
        { id: 'p3', name: '華山1914文創園區', cat: 'attractions', emoji: '🎨', region: '台北市', address: '台北市中正區八德路一段1號', description: '展覽與文創的聚集地，拍照聖地。' },
        { id: 'p4', name: '貳樓餐廳', cat: 'restaurants', emoji: '🍳', region: '台北市', address: '台北市中正區仁愛路二段108號', description: '親子友善的首選美式早午餐。' }
    ];

    // 初始化與安全性
    window.onload = () => {
        lucide.createIcons();
        switchTab('home');
        
        // 5秒後若還沒載入完成，強行關閉 loading
        setTimeout(() => {
            document.getElementById('loading-screen').classList.add('opacity-0');
            setTimeout(() => document.getElementById('loading-screen').remove(), 500);
        }, 3000);
    };

    onAuthStateChanged(auth, (user) => {
        if (user) initDataListener();
        else signInAnonymously(auth);
    });

    function initDataListener() {
        const q = collection(db, 'artifacts', appId, 'public', 'data', 'places');
        onSnapshot(q, (snapshot) => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            places = data.length > 0 ? data : PRESET_PLACES;
            renderView();
            // 數據回來後關閉 loading
            const loader = document.getElementById('loading-screen');
            if (loader) {
                loader.classList.add('opacity-0');
                setTimeout(() => loader.remove(), 500);
            }
        }, (err) => {
            console.error("Firebase Connect Fail:", err);
            places = PRESET_PLACES; // 容錯使用預設資料
            renderView();
        });
    }

    // 路由控制
    window.switchTab = (tab) => {
        currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(el => {
            if(el.dataset.tab === tab) el.classList.add('active');
            else el.classList.remove('active');
        });
        renderView();
    };

    function renderView() {
        const main = document.getElementById('main-view');
        if (currentTab === 'home') {
            main.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-[65vh] text-center">
                    <h2 class="text-2xl font-goround text-[#5A4A47] mb-2">今天要去哪走走？</h2>
                    <p class="text-[#8B8178] text-xs opacity-50 mb-12">不知道吃什麼、去哪玩？交給我們吧！</p>
                    <div id="slot-machine" class="w-64 h-64 bg-white rounded-[4.5rem] border-2 border-[#E8E3DF] flex flex-col items-center justify-center mb-16 shadow-inner relative overflow-hidden">
                        <div id="slot-emoji" class="text-8xl mb-4 drop-shadow-sm">🎠</div>
                        <div id="slot-name" class="font-goround text-[#5A4A47] px-6 truncate w-full">點擊下方開始</div>
                        <div class="absolute inset-0 bg-gradient-to-b from-white/10 to-black/5 pointer-events-none"></div>
                    </div>
                    <button id="btn-spin" class="w-full max-w-[260px] py-5 rounded-full btn-primary font-bold text-[15px] tracking-[0.2em] shadow-xl active:scale-95 transition-all">
                        隨機抽選
                    </button>
                </div>
            `;
            document.getElementById('btn-spin').onclick = startSpin;
        } else if (currentTab === 'browse') {
            main.innerHTML = `
                <div class="pt-4 space-y-6">
                    <div class="flex justify-between items-end mb-4">
                        <h2 class="text-xl font-goround">探索景點</h2>
                        <div class="text-[10px] bg-white px-3 py-1 rounded-full border border-[#E8E3DF] text-[#8B8178]">共 ${places.length} 筆</div>
                    </div>
                    <div class="grid grid-cols-1 gap-4">
                        ${places.map(p => `
                            <div onclick="openDetail('${p.id}')" class="card p-5 flex items-center gap-5 relative group">
                                <div class="w-14 h-14 bg-[#FFFBF0] rounded-[1.4rem] border border-[#E8E3DF] flex items-center justify-center text-3xl shrink-0">${p.emoji || '📍'}</div>
                                <div class="flex-1 min-w-0">
                                    <h3 class="font-bold font-goround text-[15px] text-[#5A4A47] truncate">${p.name}</h3>
                                    <div class="flex items-center gap-2 mt-1">
                                        <span class="text-[10px] px-2 py-0.5 bg-[#E4B6B6]/10 text-[#E4B6B6] rounded-md font-bold">${p.region}</span>
                                        <span class="text-[10px] text-[#8B8178] opacity-50">${p.cat === 'restaurants' ? '美食' : '景點'}</span>
                                    </div>
                                </div>
                                ${isAdmin ? `<button onclick="event.stopPropagation(); deletePlace('${p.id}')" class="p-2 text-red-200 hover:text-red-400 transition-colors"><i data-lucide="trash-2" size="16"></i></button>` : `<i data-lucide="chevron-right" size="16" class="opacity-20"></i>`}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        } else if (currentTab === 'about') {
            main.innerHTML = `
                <div class="pt-8 space-y-8 animate-fade-in">
                    <div class="text-center pb-4">
                        <div class="w-20 h-20 bg-white rounded-3xl mx-auto flex items-center justify-center shadow-sm border border-[#E8E3DF] mb-4">
                            <i data-lucide="compass" class="text-[#E4B6B6]" size="32"></i>
                        </div>
                        <h2 class="text-xl font-goround">走走 ZOUZOU</h2>
                        <p class="text-xs opacity-40 mt-1">Version 4.1.0 (Stable)</p>
                    </div>
                    <div class="bg-white p-7 rounded-[3rem] border border-[#E8E3DF] space-y-5 text-sm shadow-sm">
                        <div class="flex justify-between items-center"><span class="opacity-50 font-goround">系統連線</span><span class="text-green-500 font-bold flex items-center gap-1.5"><span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-ping"></span> 已加密連線</span></div>
                        <div class="flex justify-between items-center"><span class="opacity-50 font-goround">管理者模式</span><span>${isAdmin ? '🔑 已開啟' : '未啟用'}</span></div>
                        <div class="flex justify-between items-center"><span class="opacity-50 font-goround">資料來源</span><span>雲端同步</span></div>
                    </div>
                    <p class="text-center opacity-20 text-[10px] tracking-widest pt-12 font-goround">DESIGNED FOR BETTER WEEKENDS</p>
                </div>
            `;
        }
        lucide.createIcons();
    }

    // 抽選邏輯
    let spinning = false;
    function startSpin() {
        if (spinning || places.length === 0) return;
        spinning = true;
        let count = 0;
        const e = document.getElementById('slot-emoji');
        const n = document.getElementById('slot-name');
        const btn = document.getElementById('btn-spin');
        btn.innerText = "轉動中...";
        
        const timer = setInterval(() => {
            const r = places[Math.floor(Math.random() * places.length)];
            e.innerText = r.emoji;
            n.innerText = r.name;
            if (count++ > 18) {
                clearInterval(timer);
                spinning = false;
                btn.innerText = "重新抽選";
                showToast(`這週就決定去 ${r.name} 了！ ✨`);
            }
        }, 70);
    }

    window.openDetail = (id) => {
        const p = places.find(x => x.id === id);
        const container = document.getElementById('modal-container');
        container.innerHTML = `
            <div class="modal-overlay" onclick="closeModal()">
                <div class="modal-content" onclick="event.stopPropagation()">
                    <div class="flex justify-between items-start mb-8">
                        <div class="pr-8">
                            <h2 class="text-3xl font-goround text-[#5A4A47]">${p.name}</h2>
                            <div class="flex gap-2 mt-2">
                                <span class="text-[11px] px-3 py-1 bg-white border border-[#E8E3DF] rounded-full text-[#8B8178] font-goround">${p.region}</span>
                                <span class="text-[11px] px-3 py-1 bg-white border border-[#E8E3DF] rounded-full text-[#8B8178] font-goround">${p.cat}</span>
                            </div>
                        </div>
                        <button onclick="closeModal()" class="p-3 bg-white rounded-full border border-[#E8E3DF] active:scale-90"><i data-lucide="x" size="20"></i></button>
                    </div>
                    <div class="space-y-6 mb-10">
                        <div class="bg-white p-6 rounded-[2.5rem] border border-[#E8E3DF] flex gap-4 items-center shadow-sm">
                            <div class="w-10 h-10 bg-[#FFFBF0] rounded-xl flex items-center justify-center text-[#E4B6B6] shrink-0"><i data-lucide="map-pin" size="20"></i></div>
                            <span class="text-sm leading-relaxed opacity-80">${p.address || '地址待補充'}</span>
                        </div>
                        <div class="px-2">
                            <h4 class="text-[10px] font-bold opacity-30 tracking-widest uppercase mb-2">景點筆記</h4>
                            <p class="text-[15px] leading-relaxed text-[#5A4A47] opacity-80">${p.description || '目前還沒有相關介紹，去探索看看吧！'}</p>
                        </div>
                    </div>
                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name + ' ' + (p.address||''))}" target="_blank" class="w-full py-5 rounded-full btn-primary font-bold text-sm flex justify-center items-center gap-3 shadow-lg">
                        <i data-lucide="navigation" size="18"></i> 開啟導航
                    </a>
                </div>
            </div>
        `;
        lucide.createIcons();
    };

    window.openEditModal = () => {
        const container = document.getElementById('modal-container');
        container.innerHTML = `
            <div class="modal-overlay" onclick="closeModal()">
                <div class="modal-content !h-[85vh]" onclick="event.stopPropagation()">
                    <h2 class="text-2xl font-goround mb-8">推薦景點</h2>
                    <div class="space-y-5">
                        <input id="edit-name" placeholder="景點或餐廳名稱" class="w-full p-5 rounded-[1.5rem] bg-white border border-[#E8E3DF] outline-none text-sm focus:border-[#E4B6B6] transition-all">
                        <div class="flex gap-3">
                            <input id="edit-emoji" placeholder="圖示(Emoji)" class="w-24 p-5 rounded-[1.5rem] bg-white border border-[#E8E3DF] text-center text-xl outline-none">
                            <select id="edit-cat" class="flex-1 p-5 rounded-[1.5rem] bg-white border border-[#E8E3DF] text-sm outline-none appearance-none">
                                <option value="attractions">📍 景點</option><option value="restaurants">🍔 餐廳</option><option value="shopping">🛍️ 購物</option>
                            </select>
                        </div>
                        <input id="edit-region" placeholder="地區 (例如：台北市)" class="w-full p-5 rounded-[1.5rem] bg-white border border-[#E8E3DF] outline-none text-sm">
                        <input id="edit-addr" placeholder="完整地址 (可不填)" class="w-full p-5 rounded-[1.5rem] bg-white border border-[#E8E3DF] outline-none text-sm">
                        <textarea id="edit-desc" placeholder="推薦原因、必吃美食..." class="w-full p-5 rounded-[1.5rem] bg-white border border-[#E8E3DF] h-32 outline-none text-sm resize-none"></textarea>
                    </div>
                    <div class="flex gap-4 mt-8">
                        <button onclick="closeModal()" class="flex-1 py-5 text-sm font-goround text-[#8B8178]">取消</button>
                        <button onclick="handleSave()" class="flex-1 py-5 btn-primary rounded-full font-bold text-sm shadow-md">確認儲存</button>
                    </div>
                </div>
            </div>
        `;
        lucide.createIcons();
    };

    window.handleSave = async () => {
        const data = {
            id: `p_${Date.now()}`,
            name: document.getElementById('edit-name').value,
            emoji: document.getElementById('edit-emoji').value || '📍',
            cat: document.getElementById('edit-cat').value,
            region: document.getElementById('edit-region').value,
            address: document.getElementById('edit-addr').value,
            description: document.getElementById('edit-desc').value
        };
        if(!data.name) return showToast('請填寫名稱哦！');
        try {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'places', data.id), data);
            showToast('已同步到雲端囉 ✨');
            closeModal();
        } catch(e) {
            showToast('儲存失敗，請檢查網路');
        }
    };

    window.deletePlace = async (id) => {
        if(!confirm('要刪除這個景點嗎？')) return;
        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'places', id));
        showToast('已移除該地點');
    };

    window.closeModal = () => { document.getElementById('modal-container').innerHTML = ''; };

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.remove('hidden');
        setTimeout(() => { t.classList.remove('opacity-0', 'scale-90'); t.classList.add('opacity-100', 'scale-100'); }, 50);
        setTimeout(() => {
            t.classList.remove('opacity-100', 'scale-100');
            t.classList.add('opacity-0', 'scale-90');
            setTimeout(() => t.classList.add('hidden'), 300);
        }, 2500);
    }

    // 管理模式
    document.getElementById('btn-admin-settings').onclick = () => {
        if(isAdmin) {
            isAdmin = false;
            document.getElementById('btn-admin-key').classList.add('hidden');
            document.getElementById('btn-admin-settings').classList.remove('bg-[#E4B6B6]', 'text-white');
            showToast('已退出管理模式');
            renderView();
        } else {
            const container = document.getElementById('modal-container');
            container.innerHTML = `
                <div class="modal-overlay" onclick="closeModal()">
                    <div class="modal-content !items-center !rounded-[3.5rem] !mb-auto !mt-auto !h-auto pb-10 text-center" onclick="event.stopPropagation()">
                        <div class="w-16 h-16 bg-[#FFFBF0] rounded-3xl flex items-center justify-center text-[#E4B6B6] mb-6 shadow-sm border border-[#E8E3DF] mx-auto"><i data-lucide="shield-check" size="32"></i></div>
                        <h2 class="text-xl font-goround mb-4">管理者權限</h2>
                        <input type="password" id="admin-pwd-input" placeholder="請輸入密碼" class="w-full p-5 rounded-2xl bg-white border border-[#E8E3DF] text-center tracking-[0.6em] text-xl outline-none mb-6">
                        <div class="flex gap-4 w-full px-2">
                            <button onclick="closeModal()" class="flex-1 py-4 text-sm text-[#8B8178]">取消</button>
                            <button id="btn-verify-pwd" class="flex-1 py-4 btn-primary rounded-full font-bold text-sm shadow-lg">確認驗證</button>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
            document.getElementById('btn-verify-pwd').onclick = async () => {
                const input = document.getElementById('admin-pwd-input').value;
                const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'config', 'admin'));
                const correct = snap.exists() ? snap.data().password : '0000';
                if(input === correct) {
                    isAdmin = true;
                    document.getElementById('btn-admin-key').classList.remove('hidden');
                    document.getElementById('btn-admin-settings').classList.add('bg-[#E4B6B6]', 'text-white');
                    closeModal();
                    showToast('歡迎回來！管理權限已開啟 🍬');
                    renderView();
                } else {
                    showToast('密碼不正確喔～');
                }
            };
        }
    };

    document.getElementById('btn-admin-key').onclick = () => {
        const container = document.getElementById('modal-container');
        container.innerHTML = `
            <div class="modal-overlay" onclick="closeModal()">
                <div class="modal-content !items-center !rounded-[3.5rem] !mb-auto !mt-auto !h-auto pb-10 text-center" onclick="event.stopPropagation()">
                    <h2 class="text-xl font-goround mb-6">修改管理密碼</h2>
                    <input type="text" id="new-pwd-input" placeholder="輸入新密碼 (至少4位)" class="w-full p-5 rounded-2xl bg-white border border-[#E8E3DF] text-center outline-none mb-8 tracking-widest text-lg">
                    <button id="btn-save-pwd" class="w-full py-5 btn-primary rounded-full font-bold text-sm shadow-xl">儲存密碼並生效</button>
                </div>
            </div>
        `;
        document.getElementById('btn-save-pwd').onclick = async () => {
            const val = document.getElementById('new-pwd-input').value;
            if(val.length < 4) return showToast('密碼太短了啦');
            await setDoc(doc(db, 'artifacts', appId, 'public', 'config', 'admin'), { password: val });
            showToast('密碼更新完成 ✨');
            closeModal();
        };
    };
</script>

</body>
</html>
