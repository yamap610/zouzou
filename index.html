<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>走走 AI 整理工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --milk:  #fdf6f0;
  --cream: #f5ede4;
  --sand:  #e8d8cc;
  --rose:  #d4a89a;
  --rose2: #b8806e;
  --brown: #5c4038;
  --muted: #9a7b72;
  --card:  #fffaf7;
}
body { font-family: 'Noto Sans TC', sans-serif; background: var(--milk); color: var(--brown); min-height: 100vh; padding: 0 0 80px 0; }
header { background: var(--card); border-bottom: 1.5px solid var(--sand); padding: 16px 20px 12px; position: sticky; top: 0; z-index: 10; }
header h1 { font-size: 18px; font-weight: 700; color: var(--rose2); }
header p  { font-size: 12px; color: var(--muted); margin-top: 2px; }
.section { padding: 16px 16px 0; }
label { font-size: 13px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 6px; }
textarea { width: 100%; min-height: 140px; background: var(--card); border: 1.5px solid var(--sand); border-radius: 14px; padding: 14px; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; color: var(--brown); resize: vertical; outline: none; transition: border-color .2s; }
textarea:focus { border-color: var(--rose); }
.hint { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.6; }
.btn { display: block; width: 100%; padding: 14px; border-radius: 14px; border: none; font-family: 'Noto Sans TC', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .2s, transform .1s; }
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--rose); color: #fff; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-outline { background: transparent; border: 1.5px solid var(--rose); color: var(--rose2); font-size: 13px; padding: 10px; }
.loading { display: none; text-align: center; padding: 24px; color: var(--muted); font-size: 14px; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--sand); border-top-color: var(--rose); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.result-card { background: var(--card); border: 1.5px solid var(--sand); border-radius: 16px; margin: 14px 16px 0; overflow: hidden; }
.card-header { background: var(--cream); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
.place-name { font-size: 15px; font-weight: 700; color: var(--brown); }
.place-cat { font-size: 11px; background: var(--rose); color: #fff; padding: 2px 10px; border-radius: 20px; }
.fields { padding: 10px 14px; }
.field-row { display: flex; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--cream); align-items: flex-start; }
.field-row:last-child { border-bottom: none; }
.field-key { font-size: 11px; color: var(--muted); min-width: 68px; font-weight: 600; padding-top: 6px; }
.field-val { flex: 1; }
.field-edit { width: 100%; border: 1px solid var(--sand); border-radius: 8px; padding: 5px 9px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; background: var(--milk); color: var(--brown); outline: none; }
.field-edit:focus { border-color: var(--rose); }
.tags-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.tag-chip { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1.5px solid var(--sand); background: var(--milk); color: var(--muted); cursor: pointer; transition: all .15s; user-select: none; }
.tag-chip.selected { background: var(--rose); border-color: var(--rose); color: #fff; }
.actions { display: flex; gap: 10px; padding: 16px; }
.actions .btn { flex: 1; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--brown); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all .3s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.error-box { background: #fff0f0; border: 1.5px solid #f0c0c0; border-radius: 12px; padding: 14px; margin: 12px 16px 0; font-size: 13px; color: #b85050; display: none; }
.multi-hint { background: var(--cream); border: 1.5px solid var(--sand); border-radius: 12px; padding: 10px 14px; margin: 12px 16px 0; font-size: 12px; color: var(--rose2); display: none; }
.csv-area { display: none; margin: 14px 16px 0; background: var(--card); border: 1.5px solid var(--sand); border-radius: 14px; overflow: hidden; }
.csv-header { padding: 10px 14px; background: var(--cream); font-size: 13px; font-weight: 600; color: var(--brown); display: flex; justify-content: space-between; align-items: center; }
.csv-area textarea { border: none; border-radius: 0; min-height: 70px; font-size: 11px; background: var(--card); font-family: monospace; }
</style>
</head>
<body>

<header>
  <h1>走走 AI 整理工具</h1>
  <p>貼入任何格式的地點資訊，AI 自動整理成表格欄位</p>
</header>

<div class="section" style="margin-top:16px;">
  <label>貼入地點資訊</label>
  <textarea id="inputText" placeholder="把從網路上複製的資訊、隨手記的文字貼在這裡&#10;&#10;例如：&#10;親子餐廳 台中 OOXX&#10;地址：台中市西區民生路123號&#10;電話：04-1234-5678&#10;週一公休，11:00-21:00&#10;適合0-6歲，室內空間，有遊戲區&#10;&#10;可以一次貼多個地點！"></textarea>
  <p class="hint">支援任何格式：網頁複製、隨手筆記都可以<br>一次貼多個地點，AI 會自動分開整理</p>
</div>

<div class="section" style="margin-top:14px;">
  <button class="btn btn-primary" id="parseBtn" onclick="parseInput()">AI 整理</button>
</div>

<div class="loading" id="loading"><div class="spinner"></div><div>AI 整理中...</div></div>
<div class="error-box" id="errorBox"></div>
<div class="multi-hint" id="multiHint"></div>
<div id="resultsContainer"></div>

<div class="csv-area" id="csvArea">
  <div class="csv-header">
    <span>CSV 格式（可貼入 Sheets）</span>
    <button class="btn-outline" style="width:auto;padding:4px 12px;font-size:12px;" onclick="copyCSV()">複製</button>
  </div>
  <textarea id="csvOutput" readonly></textarea>
</div>

<div class="toast" id="toast"></div>

<script>
const GEMINI_KEY = 'AIzaSyCrH0plWiKLG2qdPAQcMcv-b6dkDsbzXT0';
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=' + GEMINI_KEY;

const FIELDS = ['name','emoji','category','tags','area','address','phone','mapsUrl','website','hours','image','notes'];
const FIELD_LABELS = { name:'名稱', emoji:'Emoji', category:'類別', tags:'標籤', area:'地區', address:'地址', phone:'電話', mapsUrl:'Maps連結', website:'網站', hours:'營業時間', image:'圖片網址', notes:'備注' };
const CAT_OPTIONS = ['景點','餐廳','購物','住宿','其他'];
const ALL_TAGS = ['動物園','農場','山林草地','水域戲水','科學館','博物館','美術館','遊樂園','親子影城','觀光工廠','其他室內','其他戶外','遊戲區','兒童座椅','兒童餐/寶寶粥','可提供兒童餐具','附設尿布檯或哺乳空間','附設停車場','周邊停車場'];

let parsedResults = [];
const norm = s => s.replace(/[／/]/g,'/').replace(/\s/g,'').toLowerCase();

async function parseInput() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { showToast('請先貼入地點資訊'); return; }
  const btn = document.getElementById('parseBtn');
  btn.disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('multiHint').style.display = 'none';
  document.getElementById('resultsContainer').innerHTML = '';
  document.getElementById('csvArea').style.display = 'none';

  const prompt = '你是一個親子地點資料整理助手。請將以下文字整理成 JSON 格式。\n\n欄位定義：\n- name: 地點名稱（必填）\n- emoji: 最適合的 emoji（1個）\n- category: 只能是以下之一：景點、餐廳、購物、住宿、其他\n- tags: 只能從以下清單選，用逗號分隔：' + ALL_TAGS.join('、') + '\n  不在清單的特色放到 notes\n- area: 縣市或地區\n- address: 詳細地址\n- phone: 電話號碼\n- mapsUrl: Google Maps 連結（如有）\n- website: 官網或粉絲專頁（如有）\n- hours: 營業時間\n- image: 圖片網址（如有）\n- notes: 其他備注（價格、注意事項、不在標籤清單的特色）\n\n規則：\n1. 多個地點回傳陣列；單一地點也回傳只有1個元素的陣列\n2. 沒有的欄位填空字串 ""\n3. # 開頭的 hashtag 忽略\n4. tags 積極從文字內容判斷\n5. 只回傳 JSON，不要任何說明文字\n\n資料：\n' + text;

  try {
    const res = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await res.json();
    let raw = data.candidates[0].content.parts[0].text.trim();
    raw = raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
    parsedResults = JSON.parse(raw);
    if (!Array.isArray(parsedResults)) parsedResults = [parsedResults];

    document.getElementById('loading').style.display = 'none';
    btn.disabled = false;

    if (parsedResults.length > 1) {
      const h = document.getElementById('multiHint');
      h.style.display = 'block';
      h.textContent = 'AI 辨識到 ' + parsedResults.length + ' 個地點';
    }
    renderResults();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    btn.disabled = false;
    const box = document.getElementById('errorBox');
    box.style.display = 'block';
    box.textContent = '整理失敗，請再試一次。（' + e.message + '）';
  }
}

function renderResults() {
  const container = document.getElementById('resultsContainer');
  container.innerHTML = '';

  parsedResults.forEach((place, idx) => {
    const card = document.createElement('div');
    card.className = 'result-card';

    const header = document.createElement('div');
    header.className = 'card-header';
    header.innerHTML = '<span class="place-name">' + (place.emoji||'') + ' ' + (place.name||'未命名') + '</span><span class="place-cat">' + (place.category||'其他') + '</span>';
    card.appendChild(header);

    const fields = document.createElement('div');
    fields.className = 'fields';

    appendRow(fields, '類別', buildSelect(idx, CAT_OPTIONS, place.category));

    ['area','address','phone','mapsUrl','website','hours','image','notes'].forEach(key => {
      const input = document.createElement('input');
      input.className = 'field-edit';
      input.value = place[key] || '';
      input.placeholder = key === 'image' ? '貼入圖片網址' : '';
      input.dataset.idx = idx; input.dataset.key = key;
      input.addEventListener('input', function() {
        parsedResults[+this.dataset.idx][this.dataset.key] = this.value;
        updateCSV();
      });
      appendRow(fields, FIELD_LABELS[key], input);
    });

    const grid = document.createElement('div');
    grid.className = 'tags-grid';
    const aiTagsN = (place.tags||'').split(',').map(t=>norm(t.trim())).filter(Boolean);
    ALL_TAGS.forEach(tag => {
      const chip = document.createElement('div');
      chip.className = 'tag-chip' + (aiTagsN.includes(norm(tag)) ? ' selected' : '');
      chip.textContent = tag;
      chip.onclick = function() {
        chip.classList.toggle('selected');
        parsedResults[idx].tags = Array.from(grid.querySelectorAll('.tag-chip.selected')).map(c=>c.textContent).join(',');
        updateCSV();
      };
      grid.appendChild(chip);
    });
    appendRow(fields, '標籤', grid);

    card.appendChild(fields);
    container.appendChild(card);
  });

  const actions = document.createElement('div');
  actions.className = 'actions';
  actions.innerHTML = '<button class="btn btn-outline" onclick="copyCSV()">複製 CSV</button><button class="btn btn-primary" onclick="copyJSON()">複製 JSON</button>';
  container.appendChild(actions);

  updateCSV();
  document.getElementById('csvArea').style.display = 'block';
}

function appendRow(parent, labelText, el) {
  const row = document.createElement('div'); row.className = 'field-row';
  const k = document.createElement('div'); k.className = 'field-key'; k.textContent = labelText;
  const v = document.createElement('div'); v.className = 'field-val'; v.appendChild(el);
  row.appendChild(k); row.appendChild(v); parent.appendChild(row);
}

function buildSelect(idx, options, current) {
  const sel = document.createElement('select'); sel.className = 'field-edit'; sel.dataset.idx = idx;
  options.forEach(opt => {
    const o = document.createElement('option'); o.value = opt; o.textContent = opt;
    if (opt === current) o.selected = true; sel.appendChild(o);
  });
  sel.addEventListener('change', function() { parsedResults[+this.dataset.idx].category = this.value; updateCSV(); });
  return sel;
}

function updateCSV() {
  const rows = parsedResults.map(p =>
    FIELDS.map(k => { const v=(p[k]||'').toString().replace(/"/g,'""'); return (v.includes(',')||v.includes('"')||v.includes('\n'))?'"'+v+'"':v; }).join(',')
  );
  document.getElementById('csvOutput').value = FIELDS.join(',') + '\n' + rows.join('\n');
}

function copyText(text, msg) {
  if (navigator.clipboard && location.protocol !== 'file:') {
    navigator.clipboard.writeText(text).then(()=>showToast(msg));
  } else {
    const ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast(msg);
  }
}
function copyCSV() { copyText(document.getElementById('csvOutput').value, 'CSV 已複製！貼到 Sheets 時間戳記後面那列'); }
function copyJSON() { copyText(JSON.stringify(parsedResults,null,2), 'JSON 已複製！'); }
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500);
}
</script>

</body>
</html>
