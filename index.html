<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <meta name="theme-color" content="#FFFBF0">
    <title>走走 ZOUZOU - 親子去處抽籤</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --milk: #FFFBF0; --white: #FFFFFF; --pink: #E4B6B6; --brown: #5A4A47; --light-gray: #F5F0EB; --border-gray: #E8DDD5; }
        html { background-color: var(--milk); }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--milk); color: var(--brown); line-height: 1.5; min-height: 100vh; overflow-x: hidden; }
        .status-bar { height: max(env(safe-area-inset-top), 12px); background: var(--milk); }
        .container { max-width: 100%; padding: 0 16px 100px 16px; }
        .page { display: none; }
        .page.active { display: flex; flex-direction: column; gap: 16px; padding-top: 12px; }
        .home-page.active { gap: 30px; }
        .home-header { text-align: center; padding: 20px 0; }
        .home-header h1 { font-size: 40px; font-weight: 700; margin-bottom: 8px; color: var(--brown); }
        .home-header p { font-size: 14px; color: #999; }
        .lottery-box { background: var(--white); border-radius: 24px; padding: 40px 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .lottery-display { min-height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .lottery-item { font-size: 60px; margin-bottom: 12px; }
        .lottery-name { font-size: 24px; font-weight: 700; color: var(--brown); }
        .lottery-area { font-size: 12px; color: #999; margin-top: 4px; }
        .btn-lottery { background: linear-gradient(135deg, var(--pink) 0%, #d9a3a3 100%); color: white; border: none; padding: 16px 32px; border-radius: 24px; font-size: 18px; font-weight: 600; cursor: pointer; font-family: inherit; width: 100%; max-width: 280px; margin: 0 auto; }
        .btn-lottery:active { transform: scale(0.96); opacity: 0.9; }
        .page-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .page-title { font-size: 24px; font-weight: 700; }
        .view-toggle { display: flex; gap: 8px; }
        .toggle-btn { width: 40px; height: 40px; border: 2px solid var(--border-gray); background: var(--white); border-radius: 12px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-family: inherit; }
        .toggle-btn.active { background: var(--pink); border-color: var(--pink); color: white; }
        .search-input { width: 100%; padding: 12px 16px; border: 1px solid var(--border-gray); border-radius: 20px; font-size: 14px; font-family: inherit; background: var(--white); color: var(--brown); }
        .filter-toggle { background: var(--white); border: 1px solid var(--border-gray); padding: 12px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--brown); font-family: inherit; text-align: left; width: 100%; }
        .filter-toggle.open { background: var(--light-gray); border-color: var(--pink); }
        .filter-panel { background: var(--white); border-radius: 16px; padding: 16px; border: 1px solid var(--border-gray); display: none; flex-direction: column; gap: 20px; }
        .filter-panel.open { display: flex; }
        .filter-group { display: flex; flex-direction: column; gap: 10px; }
        .filter-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 8px; }
        .filter-header h4 { font-size: 13px; font-weight: 700; color: var(--brown); text-transform: uppercase; }
        .filter-actions { display: flex; gap: 6px; }
        .filter-action-btn { padding: 4px 10px; font-size: 11px; font-weight: 600; border: 1px solid var(--border-gray); background: var(--white); color: var(--brown); border-radius: 12px; cursor: pointer; font-family: inherit; }
        .filter-action-btn:active { background: var(--light-gray); }
        .filter-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .filter-options label { display: flex; align-items: flex-start; gap: 6px; font-size: 13px; cursor: pointer; }
        .filter-options input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--pink); margin-top: 2px; }
        .locations-list { display: flex; flex-direction: column; gap: 12px; }
        .location-item { background: var(--white); border-radius: 16px; padding: 12px; display: flex; gap: 12px; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,0.06); cursor: pointer; transition: all 0.2s; }
        .location-item:active { transform: translateY(2px); }
        .location-left { display: flex; gap: 12px; align-items: center; flex: 1; }
        .location-emoji { font-size: 40px; }
        .location-info { min-width: 0; }
        .location-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; color: var(--brown); }
        .location-area { font-size: 12px; color: #999; }
        .location-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
        .tag { background: var(--light-gray); padding: 3px 6px; border-radius: 12px; font-size: 10px; color: #666; }
        .location-actions { display: flex; gap: 6px; }
        .loc-btn { padding: 6px 10px; background: var(--light-gray); border: none; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: inherit; }
        .loc-btn.delete { background: #f5d5d5; color: #d9696f; }
        .locations-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .location-card { background: var(--white); border-radius: 16px; padding: 16px; text-align: center; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.06); position: relative; }
        .card-emoji { font-size: 48px; margin-bottom: 8px; }
        .card-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--brown); }
        .card-area { font-size: 11px; color: #999; }
        .card-actions { position: absolute; top: 8px; right: 8px; display: none; flex; gap: 4px; }
        .location-card:hover .card-actions { display: flex; }
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-icon { font-size: 64px; margin-bottom: 16px; }
        .empty-text { color: #999; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 2000; align-items: flex-end; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: var(--white); border-radius: 24px 24px 0 0; padding: 24px 16px; width: 100%; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; gap: 12px; }
        .modal-title { flex: 1; }
        .modal-title h2 { font-size: 24px; font-weight: 700; margin-bottom: 4px; color: var(--brown); }
        .modal-subtitle { font-size: 12px; color: #999; }
        .modal-close { width: 40px; height: 40px; border: none; background: var(--light-gray); border-radius: 50%; cursor: pointer; font-size: 20px; font-family: inherit; }
        .modal-emoji { font-size: 80px; text-align: center; margin-bottom: 16px; }
        .modal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
        .modal-tag { background: var(--light-gray); padding: 6px 12px; border-radius: 20px; font-size: 12px; color: #666; }
        .modal-info-row { display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-start; }
        .modal-info-icon { font-size: 20px; margin-top: 2px; }
        .modal-info-content { flex: 1; }
        .modal-info-label { font-size: 11px; color: #999; margin-bottom: 4px; }
        .modal-info-value { font-size: 14px; color: var(--brown); word-break: break-word; }
        .modal-info-value a { color: var(--pink); text-decoration: none; }
        .modal-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-gray); }
        .modal-btn { background: var(--white); border: 2px solid var(--border-gray); padding: 12px 16px; border-radius: 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; color: var(--brown); }
        .modal-btn.primary { background: linear-gradient(135deg, var(--pink) 0%, #d9a3a3 100%); border-color: var(--pink); color: white; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-top: 1px solid var(--border-gray); display: flex; justify-content: space-around; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px; cursor: pointer; border: none; background: none; font-family: inherit; color: #999; }
        .nav-item.active { color: var(--pink); }
        .nav-icon { font-size: 24px; }
        .nav-label { font-size: 11px; }
        .admin-btn { position: fixed; top: max(env(safe-area-inset-top), 12px); right: 16px; width: 44px; height: 44px; background: transparent; border: none; font-size: 24px; cursor: pointer; z-index: 100; font-family: inherit; }
        .login-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 3000; align-items: center; justify-content: center; }
        .login-overlay.active { display: flex; }
        .login-panel { background: var(--white); border-radius: 24px; padding: 24px 20px; width: 90%; max-width: 300px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .login-panel h3 { font-size: 20px; font-weight: 700; margin-bottom: 16px; text-align: center; color: var(--brown); }
        .login-input { width: 100%; padding: 12px 16px; border: 1px solid var(--border-gray); border-radius: 12px; font-size: 14px; font-family: inherit; margin-bottom: 16px; color: var(--brown); }
        .login-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .login-btn { padding: 12px 16px; border: none; border-radius: 16px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .login-btn-submit { background: linear-gradient(135deg, var(--pink) 0%, #d9a3a3 100%); color: white; }
        .login-btn-cancel { background: var(--light-gray); color: var(--brown); }
        .form-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 2500; overflow-y: auto; padding: 20px 0; }
        .form-overlay.active { display: flex; align-items: flex-start; justify-content: center; }
        .form-panel { background: var(--white); border-radius: 24px; margin: 20px auto; padding: 24px 20px; width: 90%; max-width: 500px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .form-panel h3 { font-size: 20px; font-weight: 700; margin-bottom: 16px; color: var(--brown); }
        .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
        .form-group label { font-size: 12px; color: #999; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { padding: 10px; border: 1px solid var(--border-gray); border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--brown); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .feature-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .feature-options label { display: flex; align-items: center; gap: 6px; font-size: 13px; padding: 6px; background: var(--light-gray); border-radius: 8px; cursor: pointer; }
        .feature-options input { width: 16px; height: 16px; accent-color: var(--pink); }
        .form-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
        .form-btn { padding: 12px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
        .form-btn-submit { background: linear-gradient(135deg, var(--pink) 0%, #d9a3a3 100%); color: white; }
        .form-btn-cancel { background: var(--light-gray); color: var(--brown); }
        .admin-status { position: fixed; top: max(env(safe-area-inset-top), 12px); left: 16px; background: var(--pink); color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; z-index: 100; }
    </style>
</head>
<body>
    <div class="status-bar"></div>
    <button id="adminBtn" class="admin-btn" title="管理員">⚙️</button>
    <div id="adminStatus" class="admin-status" style="display: none;">管理員模式</div>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-panel">
            <h3>管理員登入</h3>
            <input type="password" id="adminPassword" class="login-input" placeholder="輸入密碼">
            <div class="login-buttons">
                <button class="login-btn login-btn-submit" id="loginSubmit">登入</button>
                <button class="login-btn login-btn-cancel" id="loginCancel">取消</button>
            </div>
        </div>
    </div>

    <div class="form-overlay" id="formOverlay">
        <div class="form-panel" id="formPanel"></div>
    </div>

    <div class="container">
        <!-- 首頁 -->
        <div class="page home-page active">
            <div class="home-header">
                <h1>走走</h1>
                <p>親子去處抽籤 🎲</p>
            </div>
            <div class="lottery-box">
                <div class="lottery-display">
                    <div id="lotteryResult">
                        <div class="lottery-item" id="lotteryEmoji">🌍</div>
                        <div class="lottery-name" id="lotteryName">點擊開始</div>
                        <div class="lottery-area" id="lotteryArea"></div>
                    </div>
                </div>
                <button class="btn-lottery" id="btnLottery">🎲 開始抽籤</button>
            </div>
        </div>

        <!-- 景點頁 -->
        <div class="page list-page" data-category="attraction">
            <div class="page-header">
                <h2 class="page-title">🎪 景點</h2>
                <div class="view-toggle">
                    <button class="toggle-btn active" data-view="list">☰</button>
                    <button class="toggle-btn" data-view="grid">⊞</button>
                </div>
            </div>
            <div><input type="text" class="search-input" placeholder="搜尋地點..."></div>
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <button class="filter-toggle">篩選 ⬇️</button>
                <div class="filter-panel">
                    <div class="filter-group">
                        <div class="filter-header"><h4>景點類型</h4></div>
                        <div class="filter-options">
                            <label><input type="checkbox" data-filter="type" value="動物園"> 🐾 動物園</label>
                            <label><input type="checkbox" data-filter="type" value="農場"> 🐄 農場</label>
                            <label><input type="checkbox" data-filter="type" value="山林草地"> 🌲 山林草地</label>
                            <label><input type="checkbox" data-filter="type" value="水域戲水"> 💧 水域戲水</label>
                            <label><input type="checkbox" data-filter="type" value="科學館"> 🔬 科學館</label>
                            <label><input type="checkbox" data-filter="type" value="博物館"> 🏺 博物館</label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="admin-add-btn" style="display: none;">
                <button style="width: 100%; padding: 12px; background: linear-gradient(135deg, var(--pink) 0%, #d9a3a3 100%); color: white; border: none; border-radius: 16px; font-weight: 600; font-family: inherit; cursor: pointer; margin-bottom: 12px;" onclick="openAddForm('attraction')">➕ 新增景點</button>
            </div>
            <div class="locations-list"></div>
            <div class="locations-grid" style="display: none;"></div>
        </div>

        <!-- 餐廳頁 -->
        <div class="page list-page" data-category="restaurant">
            <div class="page-header">
                <h2 class="page-title">🍽️ 餐廳</h2>
                <div class="view-toggle">
                    <button class="toggle-btn active" data-view="list">☰</button>
                    <button class="toggle-btn" data-view="grid">⊞</button>
                </div>
            </div>
            <div><input type="text" class="search-input" placeholder="搜尋地點..."></div>
            <div class="admin-add-btn" style="display: none;">
                <button style="width: 100%; padding: 12px; background: linear-gradient(135deg, var(--pink) 0%, #d9a3a3 100%); color: white; border: none; border-radius: 16px; font-weight: 600; font-family: inherit; cursor: pointer; margin-bottom: 12px;" onclick="openAddForm('restaurant')">➕ 新增餐廳</button>
            </div>
            <div class="locations-list"></div>
            <div class="locations-grid" style="display: none;"></div>
        </div>

        <!-- 購物頁 -->
        <div class="page list-page" data-category="shopping">
            <div class="page-header">
                <h2 class="page-title">🛍️ 購物</h2>
                <div class="view-toggle">
                    <button class="toggle-btn active" data-view="list">☰</button>
                    <button class="toggle-btn" data-view="grid">⊞</button>
                </div>
            </div>
            <div><input type="text" class="search-input" placeholder="搜尋地點..."></div>
            <div class="admin-add-btn" style="display: none;">
                <button style="width: 100%; padding: 12px; background: linear-gradient(135deg, var(--pink) 0%, #d9a3a3 100%); color: white; border: none; border-radius: 16px; font-weight: 600; font-family: inherit; cursor: pointer; margin-bottom: 12px;" onclick="openAddForm('shopping')">➕ 新增購物</button>
            </div>
            <div class="locations-list"></div>
            <div class="locations-grid" style="display: none;"></div>
        </div>

        <!-- 住宿頁 -->
        <div class="page list-page" data-category="accommodation">
            <div class="page-header">
                <h2 class="page-title">🏨 住宿</h2>
                <div class="view-toggle">
                    <button class="toggle-btn active" data-view="list">☰</button>
                    <button class="toggle-btn" data-view="grid">⊞</button>
                </div>
            </div>
            <div><input type="text" class="search-input" placeholder="搜尋地點..."></div>
            <div class="admin-add-btn" style="display: none;">
                <button style="width: 100%; padding: 12px; background: linear-gradient(135deg, var(--pink) 0%, #d9a3a3 100%); color: white; border: none; border-radius: 16px; font-weight: 600; font-family: inherit; cursor: pointer; margin-bottom: 12px;" onclick="openAddForm('accommodation')">➕ 新增住宿</button>
            </div>
            <div class="locations-list"></div>
            <div class="locations-grid" style="display: none;"></div>
        </div>
    </div>

    <!-- 詳細卡片 -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-card">
            <div class="modal-header">
                <div class="modal-title">
                    <h2 id="modalName"></h2>
                    <div class="modal-subtitle" id="modalArea"></div>
                </div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-emoji" id="modalEmoji"></div>
            <div class="modal-tags" id="modalTags"></div>
            <div id="modalInfo"></div>
            <div class="modal-actions">
                <button class="modal-btn" id="btnBooking" style="display: none;">📱 訂位</button>
                <button class="modal-btn" id="btnWebsite" style="display: none;">🌐 官網</button>
                <button class="modal-btn primary" id="btnNavigation">🗺️ 導航</button>
            </div>
        </div>
    </div>

    <!-- 底部導航 -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-page="0"><div class="nav-icon">🏠</div><div class="nav-label">首頁</div></button>
        <button class="nav-item" data-page="1"><div class="nav-icon">🎪</div><div class="nav-label">景點</div></button>
        <button class="nav-item" data-page="2"><div class="nav-icon">🍽️</div><div class="nav-label">餐廳</div></button>
        <button class="nav-item" data-page="3"><div class="nav-icon">🛍️</div><div class="nav-label">購物</div></button>
        <button class="nav-item" data-page="4"><div class="nav-icon">🏨</div><div class="nav-label">住宿</div></button>
    </nav>

    <script>
        const ADMIN_PASSWORD = '0100';
        let adminLoggedIn = false;
        let currentEditingLocation = null;
        const ATTRACTIONS_FEATURES = ['動物園', '農場', '山林草地', '水域戲水', '科學館', '博物館', '美術館', '遊樂園', '親子影城', '觀光工廠', '其他室內', '其他戶外'];
        const RESTAURANT_FEATURES = ['兒童遊戲區', '兒童座椅', '兒童餐', '兒童餐具', '哺乳空間', '停車場'];

        const AppState = {
            currentPage: 0,
            locations: [],
            filters: {},
            searchQuery: '',
            selectedLocation: null,

            init() {
                this.loadFromStorage();
                if (this.locations.length === 0) this.loadDefaultData();
            },

            loadDefaultData() {
                this.locations = [
                    { id: 1, category: 'attraction', emoji: '🦁', name: '台北市立動物園', area: '台北市', tags: ['動物園'], address: '台北市文山區新光路二段30號', phone: '02-2938-2300', website: 'https://www.zoo.gov.tw', hours: '09:00-17:00', description: '台灣最大的動物園。', mapsUrl: 'https://maps.app.goo.gl/zoo' },
                    { id: 2, category: 'restaurant', emoji: '🍽️', name: 'IKEA 餐廳', area: '台北市', tags: ['兒童座椅'], address: '台北市內湖區湖光路300號', phone: '02-8797-1000', website: 'https://www.ikea.com/tw', hours: '10:00-21:00', description: '瑞典風味。', mapsUrl: '' }
                ];
                this.saveToStorage();
            },

            saveToStorage() {
                localStorage.setItem('zouzou_locations', JSON.stringify(this.locations));
            },

            loadFromStorage() {
                const data = localStorage.getItem('zouzou_locations');
                if (data) this.locations = JSON.parse(data);
            },

            getFilteredLocations(category) {
                let results = this.locations.filter(loc => loc.category === category);
                if (this.searchQuery.trim()) {
                    const query = this.searchQuery.toLowerCase();
                    results = results.filter(loc => loc.name.toLowerCase().includes(query) || loc.area.toLowerCase().includes(query));
                }
                return results;
            },

            getLocationById(id) {
                return this.locations.find(loc => loc.id === id);
            },

            getRandomLocation() {
                return this.locations[Math.floor(Math.random() * this.locations.length)];
            }
        };

        function renderLocations(category) {
            const page = document.querySelector(`.page[data-category="${category}"]`);
            if (!page) return;
            const locations = AppState.getFilteredLocations(category);
            const listContainer = page.querySelector('.locations-list');
            const gridContainer = page.querySelector('.locations-grid');

            if (locations.length === 0) {
                const emptyHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">暫無地點</div></div>';
                listContainer.innerHTML = emptyHTML;
                gridContainer.innerHTML = emptyHTML;
                return;
            }

            listContainer.innerHTML = locations.map(loc => {
                const actionBtns = adminLoggedIn ? `<div class="location-actions"><button class="loc-btn" onclick="openEditForm(${loc.id})">✏️</button><button class="loc-btn delete" onclick="deleteLoc(${loc.id})">🗑️</button></div>` : '';
                return `<div class="location-item" onclick="if(!event.target.closest('.location-actions')) showDetailModal(${loc.id})"><div class="location-left"><div class="location-emoji">${loc.emoji}</div><div class="location-info"><div class="location-name">${loc.name}</div><div class="location-area">${loc.area}</div><div class="location-tags">${loc.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div></div></div>${actionBtns}</div>`;
            }).join('');

            gridContainer.innerHTML = locations.map(loc => {
                const actionBtns = adminLoggedIn ? `<div class="card-actions"><button class="loc-btn" onclick="openEditForm(${loc.id})">✏️</button><button class="loc-btn delete" onclick="deleteLoc(${loc.id})">🗑️</button></div>` : '';
                return `<div class="location-card" onclick="showDetailModal(${loc.id})"><div class="card-emoji">${loc.emoji}</div><div class="card-name">${loc.name}</div><div class="card-area">${loc.area}</div>${actionBtns}</div>`;
            }).join('');
        }

        function renderAllPages() {
            ['attraction', 'restaurant', 'shopping', 'accommodation'].forEach(renderLocations);
        }

        function showDetailModal(locationId) {
            const loc = AppState.getLocationById(locationId);
            if (!loc) return;
            document.getElementById('modalName').textContent = loc.name;
            document.getElementById('modalArea').textContent = loc.area;
            document.getElementById('modalEmoji').textContent = loc.emoji;
            document.getElementById('modalTags').innerHTML = loc.tags.map(t => `<div class="modal-tag">${t}</div>`).join('');
            let infoHTML = '';
            if (loc.address) infoHTML += `<div class="modal-info-row"><div class="modal-info-icon">📍</div><div class="modal-info-content"><div class="modal-info-label">地址</div><div class="modal-info-value">${loc.address}</div></div></div>`;
            if (loc.phone) infoHTML += `<div class="modal-info-row"><div class="modal-info-icon">📞</div><div class="modal-info-content"><div class="modal-info-label">電話</div><div class="modal-info-value"><a href="tel:${loc.phone}">${loc.phone}</a></div></div></div>`;
            if (loc.hours) infoHTML += `<div class="modal-info-row"><div class="modal-info-icon">🕐</div><div class="modal-info-content"><div class="modal-info-label">營業時間</div><div class="modal-info-value">${loc.hours}</div></div></div>`;
            if (loc.description) infoHTML += `<div class="modal-info-row"><div class="modal-info-icon">📝</div><div class="modal-info-content"><div class="modal-info-label">簡介</div><div class="modal-info-value">${loc.description}</div></div></div>`;
            document.getElementById('modalInfo').innerHTML = infoHTML;
            
            const btnBooking = document.getElementById('btnBooking');
            const btnWebsite = document.getElementById('btnWebsite');
            const btnNavigation = document.getElementById('btnNavigation');
            
            if (loc.bookingUrl) {
                btnBooking.style.display = 'block';
                btnBooking.onclick = () => window.open(loc.bookingUrl);
            } else {
                btnBooking.style.display = 'none';
            }
            if (loc.website) {
                btnWebsite.style.display = 'block';
                btnWebsite.onclick = () => window.open(loc.website);
            } else {
                btnWebsite.style.display = 'none';
            }
            btnNavigation.onclick = () => {
                const url = loc.mapsUrl || `https://www.google.com/maps/search/${encodeURIComponent(loc.name)}`;
                window.open(url);
            };
            AppState.selectedLocation = loc;
            document.getElementById('detailModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function openAddForm(category) {
            currentEditingLocation = null;
            openFormPanel(category, null);
        }

        function openEditForm(locationId) {
            const loc = AppState.getLocationById(locationId);
            if (loc) {
                currentEditingLocation = loc;
                openFormPanel(loc.category, loc);
            }
        }

        function openFormPanel(category, location) {
            const isEdit = !!location;
            let html = `<h3>${isEdit ? '編輯' : '新增'}地點</h3>`;
            html += '<div style="max-height: 70vh; overflow-y: auto; margin-bottom: 16px;">';
            html += `<div class="form-group"><label>類別</label><select id="fCat" onchange="updateFeatures()">${['attraction', 'restaurant', 'shopping', 'accommodation'].map(c => `<option value="${c}" ${c === category ? 'selected' : ''}>${c}</option>`).join('')}</select></div>`;
            html += `<div class="form-group"><label>名稱 *</label><input id="fName" value="${location?.name || ''}" required></div>`;
            html += `<div class="form-group"><label>Emoji *</label><input id="fEmoji" maxlength="2" value="${location?.emoji || ''}" required></div>`;
            html += `<div class="form-group"><label>地區 *</label><input id="fArea" value="${location?.area || ''}" required></div>`;
            html += `<div class="form-group"><label>地址</label><input id="fAddress" value="${location?.address || ''}"></div>`;
            html += `<div class="form-group"><label>電話</label><input id="fPhone" value="${location?.phone || ''}"></div>`;
            html += `<div class="form-group"><label>Google Maps URL</label><input type="url" id="fMaps" value="${location?.mapsUrl || ''}"></div>`;
            html += `<div class="form-group"><label>官網</label><input type="url" id="fWebsite" value="${location?.website || ''}"></div>`;
            html += `<div class="form-group"><label>訂位</label><input type="url" id="fBooking" value="${location?.bookingUrl || ''}"></div>`;
            html += `<div class="form-group"><label>營業時間</label><input id="fHours" value="${location?.hours || ''}"></div>`;
            html += `<div class="form-group"><label>簡介</label><textarea id="fDesc">${location?.description || ''}</textarea></div>`;
            html += '<div id="featureDiv" style="display: none;"><label style="display: block; margin-bottom: 8px;">特色</label><div class="feature-options" id="featureOptions"></div></div>';
            html += `<input type="hidden" id="fTags" value="${location?.tags?.join(', ') || ''}">`;
            html += '</div>';
            html += '<div class="form-buttons"><button class="form-btn form-btn-submit" onclick="saveLoc()">保存</button><button class="form-btn form-btn-cancel" onclick="closeFormPanel()">取消</button></div>';
            document.getElementById('formPanel').innerHTML = html;
            document.getElementById('formOverlay').classList.add('active');
            updateFeatures();
        }

        function updateFeatures() {
            const cat = document.getElementById('fCat').value;
            const featureDiv = document.getElementById('featureDiv');
            const featureOptions = document.getElementById('featureOptions');
            const features = cat === 'attraction' ? ATTRACTIONS_FEATURES : (cat === 'restaurant' ? RESTAURANT_FEATURES : []);
            featureDiv.style.display = features.length > 0 ? 'block' : 'none';
            const selectedTags = (document.getElementById('fTags').value || '').split(',').map(t => t.trim());
            featureOptions.innerHTML = features.map(f => `<label><input type="checkbox" value="${f}" ${selectedTags.includes(f) ? 'checked' : ''} onchange="updateTags()"> ${f}</label>`).join('');
        }

        function updateTags() {
            const selected = Array.from(document.querySelectorAll('#featureOptions input:checked')).map(i => i.value);
            document.getElementById('fTags').value = selected.join(', ');
        }

        function saveLoc() {
            const data = {
                category: document.getElementById('fCat').value,
                name: document.getElementById('fName').value,
                emoji: document.getElementById('fEmoji').value,
                area: document.getElementById('fArea').value,
                address: document.getElementById('fAddress').value,
                phone: document.getElementById('fPhone').value,
                mapsUrl: document.getElementById('fMaps').value,
                website: document.getElementById('fWebsite').value,
                bookingUrl: document.getElementById('fBooking').value,
                hours: document.getElementById('fHours').value,
                description: document.getElementById('fDesc').value,
                tags: (document.getElementById('fTags').value || '').split(',').map(t => t.trim()).filter(t => t)
            };
            if (!data.name || !data.emoji || !data.area) {
                alert('名稱、Emoji、地區為必填');
                return;
            }
            if (currentEditingLocation) {
                const idx = AppState.locations.findIndex(l => l.id === currentEditingLocation.id);
                if (idx !== -1) AppState.locations[idx] = { id: currentEditingLocation.id, ...data };
            } else {
                const newId = Math.max(...AppState.locations.map(l => l.id), 0) + 1;
                AppState.locations.push({ id: newId, ...data });
            }
            AppState.saveToStorage();
            renderAllPages();
            closeFormPanel();
        }

        function deleteLoc(id) {
            if (confirm('確定刪除?')) {
                AppState.locations = AppState.locations.filter(l => l.id !== id);
                AppState.saveToStorage();
                renderAllPages();
            }
        }

        function closeFormPanel() {
            document.getElementById('formOverlay').classList.remove('active');
        }

        function performLottery() {
            const btn = document.getElementById('btnLottery');
            btn.disabled = true;
            const candidates = AppState.locations;
            if (candidates.length === 0) {
                alert('還沒有地點');
                btn.disabled = false;
                return;
            }
            let i = 0;
            const interval = setInterval(() => {
                const item = candidates[i % candidates.length];
                document.getElementById('lotteryEmoji').textContent = item.emoji;
                document.getElementById('lotteryName').textContent = item.name;
                document.getElementById('lotteryArea').textContent = item.area;
                i++;
            }, 80);
            setTimeout(() => {
                clearInterval(interval);
                const final = candidates[Math.floor(Math.random() * candidates.length)];
                document.getElementById('lotteryEmoji').textContent = final.emoji;
                document.getElementById('lotteryName').textContent = final.name;
                document.getElementById('lotteryArea').textContent = final.area;
                btn.disabled = false;
                setTimeout(() => showDetailModal(final.id), 300);
            }, 2000);
        }

        function setAdminMode(enabled) {
            adminLoggedIn = enabled;
            document.getElementById('adminStatus').style.display = enabled ? 'block' : 'none';
            document.querySelectorAll('.admin-add-btn').forEach(el => el.style.display = enabled ? 'block' : 'none');
            renderAllPages();
        }

        window.addEventListener('DOMContentLoaded', () => {
            AppState.init();
            renderAllPages();

            // 導航
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.addEventListener('click', () => {
                    const pageIdx = parseInt(btn.dataset.page);
                    document.querySelectorAll('.page').forEach((p, i) => p.classList.toggle('active', i === pageIdx));
                    document.querySelectorAll('.nav-item').forEach((item, i) => item.classList.toggle('active', i === pageIdx));
                });
            });

            // 抽籤
            document.getElementById('btnLottery').addEventListener('click', performLottery);

            // 管理員按鈕
            document.getElementById('adminBtn').addEventListener('click', () => {
                if (adminLoggedIn) {
                    setAdminMode(false);
                } else {
                    document.getElementById('loginOverlay').classList.add('active');
                    document.getElementById('adminPassword').focus();
                }
            });

            document.getElementById('loginSubmit').addEventListener('click', () => {
                if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
                    adminLoggedIn = true;
                    document.getElementById('loginOverlay').classList.remove('active');
                    setAdminMode(true);
                    document.getElementById('adminPassword').value = '';
                } else {
                    alert('密碼錯誤');
                }
            });

            document.getElementById('loginCancel').addEventListener('click', () => {
                document.getElementById('loginOverlay').classList.remove('active');
                document.getElementById('adminPassword').value = '';
            });

            // 檢視模式
            document.querySelectorAll('.view-toggle').forEach(toggle => {
                toggle.addEventListener('click', (e) => {
                    if (e.target.classList.contains('toggle-btn')) {
                        const page = e.target.closest('.page-header').parentElement;
                        const mode = e.target.dataset.view;
                        toggle.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.view === mode));
                        const list = page.querySelector('.locations-list');
                        const grid = page.querySelector('.locations-grid');
                        if (mode === 'list') {
                            list.style.display = 'flex';
                            grid.style.display = 'none';
                        } else {
                            list.style.display = 'none';
                            grid.style.display = 'grid';
                        }
                    }
                });
            });

            // 搜尋
            document.querySelectorAll('.search-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    const page = e.target.closest('.page');
                    const cat = page.dataset.category;
                    AppState.searchQuery = e.target.value;
                    renderLocations(cat);
                });
            });

            // 篩選
            document.querySelectorAll('.filter-toggle').forEach(toggle => {
                toggle.addEventListener('click', (e) => {
                    const panel = e.target.nextElementSibling;
                    e.target.classList.toggle('open');
                    panel.classList.toggle('open');
                });
            });

            // 關閉 modal
            document.getElementById('detailModal').addEventListener('click', (e) => {
                if (e.target.id === 'detailModal') closeModal();
            });

            // 點擊表單外關閉
            document.getElementById('formOverlay').addEventListener('click', (e) => {
                if (e.target.id === 'formOverlay') closeFormPanel();
            });
        });
    </script>
</body>
</html>
