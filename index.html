<!DOCTYPE html>

<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>走走 - 地點探險</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Serif TC', serif; background: #fdf8f3; color: #333; }
        html, body { height: 100%; }
        .app { display: flex; flex-direction: column; height: 100vh; }
        .header { background: linear-gradient(135deg, #c9a97a 0%, #a07848 100%); color: white; padding: 16px 20px; text-align: center; }
        .header h1 { font-size: 24px; font-weight: 700; }
        .header p { font-size: 12px; opacity: 0.9; }
        .controls { padding: 12px 16px; background: white; display: flex; gap: 8px; border-bottom: 1px solid #e8dcc8; flex-wrap: wrap; }
        .btn { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600; }
        .btn-primary { background: #c9a97a; color: white; }
        .btn-secondary { background: #f5ede2; color: #a07848; border: 1px solid #c9a97a; }
        .toggle-btn { padding: 8px 12px; border: 1px solid #c9a97a; background: white; color: #a07848; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .toggle-btn.active { background: #c9a97a; color: white; }
        .search-box { flex: 1; display: flex; align-items: center; background: #f5ede2; border-radius: 6px; padding: 0 12px; min-width: 150px; }
        .search-box input { border: none; background: transparent; padding: 8px; outline: none; font-family: inherit; width: 100%; }
        .content { flex: 1; overflow-y: auto; padding: 12px 16px; }
        .card-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .place-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; }
        .card-img { width: 100%; height: 120px; background: linear-gradient(135deg, #ede8e3, #f5ede2); display: flex; align-items: center; justify-content: center; font-size: 48px; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 12px; }
        .card-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
        .card-region { font-size: 11px; color: #999; }
        .card-cat { font-size: 10px; background: #f5ede2; color: #a07848; padding: 2px 6px; border-radius: 3px; display: inline-block; margin-top: 4px; }
        .list-view { display: flex; flex-direction: column; gap: 8px; }
        .list-item { background: white; border-radius: 8px; padding: 12px; display: flex; gap: 12px; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; }
        .list-emoji { font-size: 32px; min-width: 40px; }
        .list-info { flex: 1; }
        .list-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .list-meta { font-size: 12px; color: #999; }
        .list-fav { width: 32px; height: 32px; border: 1px solid #ddd; background: white; border-radius: 50%; cursor: pointer; font-size: 16px; }
        .list-fav.on { background: #ffe4e4; }
        .detail-page { display: none; position: fixed; inset: 0; background: #fdf8f3; z-index: 100; flex-direction: column; }
        .detail-page.show { display: flex; }
        .detail-header { background: linear-gradient(135deg, #c9a97a 0%, #a07848 100%); color: white; padding: 12px 16px; display: flex; justify-content: space-between; }
        .detail-content { flex: 1; overflow-y: auto; padding: 16px; }
        .detail-img { width: 100%; height: 200px; background: linear-gradient(135deg, #ede8e3, #f5ede2); display: flex; align-items: center; justify-content: center; font-size: 80px; border-radius: 8px; margin-bottom: 16px; }
        .detail-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .detail-section { background: white; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .detail-label { font-size: 11px; color: #999; font-weight: 600; margin-bottom: 4px; }
        .detail-value { font-size: 14px; color: #333; }
        .detail-actions { display: flex; gap: 8px; padding: 12px 16px; background: white; border-top: 1px solid #e8dcc8; }
        .detail-actions .btn { flex: 1; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: 12px; padding: 20px; max-width: 90%; max-height: 80vh; overflow-y: auto; width: 100%; }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
        .form-group { margin-bottom: 12px; }
        .form-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; display: block; }
        .form-input, .form-select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 14px; }
        .detail-textarea { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 8px; font-family: inherit; font-size: 14px; min-height: 80px; }
        .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
        .modal-actions .btn { flex: 1; }
        .empty { text-align: center; padding: 40px 20px; }
        .loading { text-align: center; padding: 20px; }
        .spinner { width: 30px; height: 30px; border: 3px solid #f5ede2; border-top-color: #c9a97a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .card-view { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 20px; }
        }
    </style>
</head>

    <div class="controls">
        <button class="btn btn-primary" onclick="app.openAddModal()">➕ 新增</button>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜尋..." oninput="app.filterPlaces()">
        </div>
        <div style="display: flex; gap: 4px;">
            <button class="toggle-btn active" onclick="app.switchView('card')">🎴</button>
            <button class="toggle-btn" onclick="app.switchView('list')">📋</button>
        </div>
        <button class="btn btn-secondary" onclick="app.openSettings()">⚙️</button>
    </div>
    
    <div class="content" id="content">
        <div class="empty">
            <div style="font-size: 48px; margin-bottom: 12px;">📍</div>
            <div style="font-size: 14px; color: #999;">沒有地點，點「新增」開始吧！</div>
        </div>
    </div>
</div>

<div class="detail-page" id="detailPage">
    <div class="detail-header">
        <h2 id="detailName" style="flex: 1;"></h2>
        <button class="btn" style="background: rgba(255,255,255,0.2); color: white; width: 32px; height: 32px; padding: 0; border-radius: 50%;" onclick="app.closeDetail()">✕</button>
    </div>
    <div class="detail-content" id="detailContent"></div>
    <div class="detail-actions">
        <button class="btn btn-primary" style="padding: 6px 12px; font-size: 12px;" onclick="app.editPlace()">編輯</button>
        <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="app.deletePlace()">刪除</button>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <div class="modal-title">⚙️ 設定</div>
        <div style="background: #FFF5E8; border-radius: 8px; padding: 12px; margin-bottom: 16px;">
            <div style="font-size: 13px; color: #666; line-height: 1.6;">
                <b>🔑 Claude API Key</b><br>
                需要 API Key 才能使用 AI 搜尋功能。<br><br>
                <a href="https://console.anthropic.com" target="_blank" style="color: #c9a97a; text-decoration: none;">👉 打開 Claude 官網申請</a>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">API Key</label>
            <input type="password" id="apiKeyInput" class="form-input" placeholder="sk-ant-...">
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="app.closeSettings()">取消</button>
            <button class="btn btn-primary" onclick="app.saveAPIKey()">保存</button>
        </div>
    </div>
</div>

<div class="modal" id="addModal">
    <div class="modal-content">
        <div class="modal-title">🆕 新增地點</div>
        <div id="modalBody"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="app.closeAddModal()">取消</button>
            <button class="btn btn-primary" id="searchBtn" onclick="app.searchPlace()">🔍 搜尋</button>
        </div>
    </div>
</div>

<script>
    const app = {
        places: [],
        currentView: 'card',
        currentDetailId: null,
        currentEditId: null,
        claudeKey: '',

        init() {
            this.claudeKey = localStorage.getItem('zou_claude_key') || '';
            this.places = JSON.parse(localStorage.getItem('zou_places') || '[]');
            this.render();
        },

        save() {
            localStorage.setItem('zou_places', JSON.stringify(this.places));
        },

        render() {
            const filtered = this.getFiltered();
            const html = filtered.length ? 
                (this.currentView === 'card' ? this.renderCard(filtered) : this.renderList(filtered)) :
                '<div class="empty"><div style="font-size: 48px; margin-bottom: 12px;">🔍</div><div style="color: #999;">沒有找到相符的地點</div></div>';
            document.getElementById('content').innerHTML = html;
        },

        renderCard(items) {
            return '<div class="card-view">' + items.map(p => `
                <div class="place-card" onclick="app.openDetail('${p.id}')">
                    <div class="card-img">${p.imageUrl ? `<img src="${p.imageUrl}" onerror="this.style.display='none'">` : ''}<span style="${p.imageUrl ? 'display:none' : ''}">${p.emoji || '📍'}</span></div>
                    <div class="card-body">
                        <div class="card-name">${p.name}</div>
                        <div class="card-region">${p.region || '-'}</div>
                        <div class="card-cat">${this.getCatLabel(p.category)}</div>
                    </div>
                </div>
            `).join('') + '</div>';
        },

        renderList(items) {
            return '<div class="list-view">' + items.map(p => `
                <div class="list-item" onclick="app.openDetail('${p.id}')">
                    <div class="list-emoji">${p.emoji || '📍'}</div>
                    <div class="list-info">
                        <div class="list-name">${p.name}</div>
                        <div class="list-meta">${p.region || '-'} • ${this.getCatLabel(p.category)}</div>
                    </div>
                    <button class="list-fav ${p.favorite ? 'on' : ''}" onclick="event.stopPropagation(); app.toggleFav('${p.id}')">${p.favorite ? '❤️' : '🤍'}</button>
                </div>
            `).join('') + '</div>';
        },

        getFiltered() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            if (!q) return this.places;
            return this.places.filter(p => 
                p.name.toLowerCase().includes(q) || 
                (p.region || '').toLowerCase().includes(q) || 
                (p.description || '').toLowerCase().includes(q) || 
                (p.note || '').toLowerCase().includes(q)
            );
        },

        filterPlaces() {
            this.render();
        },

        switchView(v) {
            this.currentView = v;
            document.querySelectorAll('.toggle-btn').forEach((b, i) => 
                b.classList.toggle('active', (i === 0 && v === 'card') || (i === 1 && v === 'list'))
            );
            this.render();
        },

        getCatLabel(c) {
            const l = {attractions: '🏞️ 景點', restaurants: '🍽️ 餐廳', other: '✨ 其他'};
            return l[c] || c;
        },

        openDetail(id) {
            const p = this.places.find(x => x.id === id);
            if (!p) return;
            this.currentDetailId = id;
            document.getElementById('detailName').textContent = p.name;
            document.getElementById('detailContent').innerHTML = `
                <div class="detail-img">${p.imageUrl ? `<img src="${p.imageUrl}" onerror="this.style.display='none'">` : ''}<span style="${p.imageUrl ? 'display:none' : ''}">${p.emoji || '📍'}</span></div>
                ${[{l:'分類',v:this.getCatLabel(p.category)},{l:'地區',v:p.region||'-'},{l:'地址',v:p.address||'-'},{l:'電話',v:p.phone?`<a href="tel:${p.phone}">${p.phone}</a>`:'-'},{l:'簡介',v:p.description||'-'},{l:'筆記',v:p.note||'(無)'}].map(s=>`<div class="detail-section"><div class="detail-label">${s.l}</div><div class="detail-value">${s.v}</div></div>`).join('')}
            `;
            document.getElementById('detailPage').classList.add('show');
        },

        closeDetail() {
            document.getElementById('detailPage').classList.remove('show');
            this.currentDetailId = null;
        },

        toggleFav(id) {
            const p = this.places.find(x => x.id === id);
            p.favorite = !p.favorite;
            this.save();
            this.render();
        },

        openSettings() {
            document.getElementById('apiKeyInput').value = this.claudeKey;
            document.getElementById('settingsModal').classList.add('show');
        },

        closeSettings() {
            document.getElementById('settingsModal').classList.remove('show');
        },

        saveAPIKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (!key.startsWith('sk-ant-')) {
                alert('API Key 格式錯誤（應以 sk-ant- 開頭）');
                return;
            }
            this.claudeKey = key;
            localStorage.setItem('zou_claude_key', key);
            alert('✅ 已保存');
            this.closeSettings();
        },

        openAddModal() {
            if (!this.claudeKey) {
                alert('請先設定 API Key（點⚙️）');
                return;
            }
            this.currentEditId = null;
            document.getElementById('addModal').classList.add('show');
            document.getElementById('modalBody').innerHTML = `
                <div class="form-group">
                    <label class="form-label">搜尋方式</label>
                    <select id="searchMethod" class="form-select" onchange="app.updateSearchUI()">
                        <option value="name">地點名稱</option>
                        <option value="url">Google Maps URL</option>
                    </select>
                </div>
                <div class="form-group" id="searchInput1">
                    <label class="form-label">地點名稱</label>
                    <input type="text" id="placeName" class="form-input">
                </div>
                <div class="form-group" id="searchInput2" style="display:none;">
                    <label class="form-label">Google Maps URL</label>
                    <input type="text" id="placeUrl" class="form-input">
                </div>
                <div id="searchResult"></div>
            `;
            document.getElementById('searchBtn').textContent = '🔍 搜尋';
        },

        closeAddModal() {
            document.getElementById('addModal').classList.remove('show');
        },

        updateSearchUI() {
            const m = document.getElementById('searchMethod').value;
            document.getElementById('searchInput1').style.display = m === 'name' ? 'block' : 'none';
            document.getElementById('searchInput2').style.display = m === 'url' ? 'block' : 'none';
        },

        async searchPlace() {
            const m = document.getElementById('searchMethod').value;
            const inp = m === 'name' ? document.getElementById('placeName').value : document.getElementById('placeUrl').value;
            if (!inp) { alert('請輸入'); return; }
            
            const rd = document.getElementById('searchResult');
            rd.innerHTML = '<div class="loading"><div class="spinner"></div>搜尋中...</div>';
            
            try {
                const prompt = m === 'url' ? `From URL: ${inp}` : `Search: ${inp}`;
                
                const r = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': this.claudeKey,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 500,
                        messages: [{role: 'user', content: `${prompt}\nReturn JSON: {"name":"","region":"","address":"","phone":"","description":"","emoji":""}`}]
                    })
                });
                
                const d = await r.json();
                let t = d.content[0].text.trim();
                if (t.startsWith('```')) t = t.replace(/^```json?\n?/, '').replace(/\n?```$/, '');
                const res = JSON.parse(t);
                rd.innerHTML = `<div style="margin-top:16px;"><div class="form-group"><label class="form-label">名稱</label><input type="text" id="resultName" class="form-input" value="${res.name || ''}"></div><div class="form-group"><label class="form-label">Emoji</label><input type="text" id="resultEmoji" class="form-input" value="${res.emoji || '📍'}"></div><div class="form-group"><label class="form-label">分類</label><select id="resultCat" class="form-select"><option value="attractions">🏞️ 景點</option><option value="restaurants">🍽️ 餐廳</option><option value="other">✨ 其他</option></select></div><div class="form-group"><label class="form-label">地區</label><input type="text" id="resultRegion" class="form-input" value="${res.region || ''}"></div><div class="form-group"><label class="form-label">地址</label><input type="text" id="resultAddress" class="form-input" value="${res.address || ''}"></div><div class="form-group"><label class="form-label">電話</label><input type="text" id="resultPhone" class="form-input" value="${res.phone || ''}"></div><div class="form-group"><label class="form-label">簡介</label><textarea id="resultDesc" class="detail-textarea">${res.description || ''}</textarea></div><div class="form-group"><label class="form-label">照片URL</label><input type="text" id="resultImg" class="form-input"></div><div class="form-group"><label class="form-label">筆記</label><textarea id="resultNote" class="detail-textarea"></textarea></div><button class="btn btn-primary" onclick="app.saveResult()" style="width:100%; margin-top:12px;">保存</button></div>`;
            } catch (e) {
                rd.innerHTML = `<div style="color:red;padding:12px;">失敗: ${e.message}</div>`;
            }
        },

        saveResult() {
            const n = document.getElementById('resultName').value;
            if (!n) { alert('需要名稱'); return; }
            const np = {
                id: Date.now().toString(),
                name: n,
                emoji: document.getElementById('resultEmoji').value || '📍',
                category: document.getElementById('resultCat').value || 'other',
                region: document.getElementById('resultRegion').value || '',
                address: document.getElementById('resultAddress').value || '',
                phone: document.getElementById('resultPhone').value || '',
                description: document.getElementById('resultDesc').value || '',
                imageUrl: document.getElementById('resultImg').value || '',
                note: document.getElementById('resultNote').value || '',
                favorite: false,
                createdAt: new Date().toISOString()
            };
            this.places.unshift(np);
            this.save();
            this.render();
            this.closeAddModal();
            alert('已新增！');
        },

        editPlace() {
            if (!this.currentDetailId) return;
            const p = this.places.find(x => x.id === this.currentDetailId);
            this.currentEditId = this.currentDetailId;
            this.closeDetail();
            document.getElementById('addModal').classList.add('show');
            document.getElementById('modalBody').innerHTML = `
                <div class="form-group"><label class="form-label">名稱</label><input type="text" id="editName" class="form-input" value="${p.name}"></div>
                <div class="form-group"><label class="form-label">分類</label><select id="editCat" class="form-select"><option value="attractions" ${p.category==='attractions'?'selected':''}>🏞️ 景點</option><option value="restaurants" ${p.category==='restaurants'?'selected':''}>🍽️ 餐廳</option><option value="other" ${p.category==='other'?'selected':''}>✨ 其他</option></select></div>
                <div class="form-group"><label class="form-label">地區</label><input type="text" id="editRegion" class="form-input" value="${p.region||''}"></div>
                <div class="form-group"><label class="form-label">地址</label><input type="text" id="editAddress" class="form-input" value="${p.address||''}"></div>
                <div class="form-group"><label class="form-label">電話</label><input type="text" id="editPhone" class="form-input" value="${p.phone||''}"></div>
                <div class="form-group"><label class="form-label">簡介</label><textarea id="editDesc" class="detail-textarea">${p.description||''}</textarea></div>
                <div class="form-group"><label class="form-label">照片URL</label><input type="text" id="editImg" class="form-input" value="${p.imageUrl||''}"></div>
                <div class="form-group"><label class="form-label">筆記</label><textarea id="editNote" class="detail-textarea">${p.note||''}</textarea></div>
            `;
            document.getElementById('searchBtn').textContent = '保存';
            document.getElementById('searchBtn').onclick = () => this.saveEdit();
        },

        saveEdit() {
            const p = this.places.find(x => x.id === this.currentEditId);
            p.name = document.getElementById('editName').value;
            p.category = document.getElementById('editCat').value;
            p.region = document.getElementById('editRegion').value;
            p.address = document.getElementById('editAddress').value;
            p.phone = document.getElementById('editPhone').value;
            p.description = document.getElementById('editDesc').value;
            p.imageUrl = document.getElementById('editImg').value;
            p.note = document.getElementById('editNote').value;
            this.save();
            this.render();
            this.closeAddModal();
            this.currentEditId = null;
            document.getElementById('searchBtn').textContent = '🔍 搜尋';
        },

        deletePlace() {
            if (!this.currentDetailId || !confirm('確定刪除？')) return;
            this.places = this.places.filter(p => p.id !== this.currentDetailId);
            this.save();
            this.render();
            this.closeDetail();
        }
    };

    app.init();
</script>
